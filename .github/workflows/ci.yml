name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e . pytest ruff
      - name: Lint
        run: ruff check src tests scripts
      - name: Tests
        run: PYTHONPATH=src pytest tests/ -q
      - name: Demos (smoke)
        run: |
          PYTHONPATH=src python scripts/ontology_demo.py
          PYTHONPATH=src python scripts/run_simulation.py
